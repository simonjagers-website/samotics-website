<!--
  404 Error Page
  Paste this into the Bricks Code element HTML tab
  Custom branded error page with search and quick links
-->

<section class="sam-404">
  <!-- Background 404 Text -->
  <div class="sam-404__background">404</div>

  <!-- Content Wrapper -->
  <div class="sam-404__content">
    <h1 class="sam-404__title">Page not found</h1>
    <p class="sam-404__description">The page you're looking for doesn't exist or has been moved. Try one of these instead.</p>

    <!-- Search Bar -->
    <form class="sam-404__search" id="search-form">
      <input type="text" class="sam-404__search-input" id="search-input" placeholder="Search our site...">
      <button type="submit" class="sam-404__search-button">Search</button>
    </form>

    <!-- Quick Links Grid -->
    <div class="sam-404__links">
      <a href="/" class="sam-404__link-card">
        <p class="sam-404__link-title">Home</p>
      </a>
      <a href="/technology/" class="sam-404__link-card">
        <p class="sam-404__link-title">Technology</p>
      </a>
      <a href="/platform/sam4/" class="sam-404__link-card">
        <p class="sam-404__link-title">Platform</p>
      </a>
      <a href="/industries/" class="sam-404__link-card">
        <p class="sam-404__link-title">Industries</p>
      </a>
      <a href="/proof/" class="sam-404__link-card">
        <p class="sam-404__link-title">Proof</p>
      </a>
      <a href="/contact/" class="sam-404__link-card">
        <p class="sam-404__link-title">Contact</p>
      </a>
    </div>

    <!-- Back Link -->
    <div class="sam-404__back">
      <button type="button" class="sam-404__back-button" id="back-button">← Go back</button>
    </div>
  </div>

</section>
