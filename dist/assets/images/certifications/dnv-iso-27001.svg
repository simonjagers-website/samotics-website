<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .dnv-text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Outer arc lines -->
  <path d="M 40 170 A 85 85 0 0 1 40 30" fill="none" stroke="#00A3E0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 160 30 A 85 85 0 0 1 160 170" fill="none" stroke="#00A3E0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Curved text top: MANAGEMENTSYSTEEM -->
  <path id="topArc27" d="M 35 155 A 80 80 0 0 1 35 45" fill="none"/>
  <text class="dnv-text" font-size="13" font-weight="700" fill="#1A1A1A" letter-spacing="1.5">
    <textPath href="#topArc27" startOffset="5%">MANAGEMENTSYSTEEM</textPath>
  </text>
  <!-- Curved text bottom right: CERTIFICAAT -->
  <path id="botArc27" d="M 165 45 A 80 80 0 0 1 165 155" fill="none"/>
  <text class="dnv-text" font-size="13" font-weight="700" fill="#1A1A1A" letter-spacing="1.5">
    <textPath href="#botArc27" startOffset="12%">CERTIFICAAT</textPath>
  </text>
  <!-- DNV logo bar -->
  <rect x="60" y="82" width="80" height="4" rx="0" fill="#6DCFF6"/>
  <rect x="60" y="88" width="80" height="4" rx="0" fill="#6AA140"/>
  <rect x="60" y="94" width="80" height="4" rx="0" fill="#003B71"/>
  <!-- DNV text -->
  <text x="100" y="116" text-anchor="middle" class="dnv-text" font-size="26" font-weight="900" fill="#003B71">DNV</text>
  <!-- ISO 27001 text -->
  <text x="100" y="150" text-anchor="middle" class="dnv-text" font-size="18" font-weight="700" fill="#003B71">ISO 27001</text>
</svg>