<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found | Samotics</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @font-face {
      font-family: 'IBM Plex Sans';
      font-style: normal;
      font-weight: 100 700;
      font-display: swap;
      src: url('https://fonts.gstatic.com/s/ibmplexsans/v21/-ZpuIrhieO4EqksVmzvDnQwCUMsjx4BsS7B_.woff2') format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('https://fonts.gstatic.com/s/ibmplexmono/v18/VdGfAZkcM64AImR6m6pNRKCWcsyns4DtNg.woff2') format('woff2');
    }
    :root {
      --accent-color: #1f8aed;
      --background-color: #ffffff;
      --text-color: #222;
      --border-color: #e0e0e0;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-color);
      background-color: #f9f9f9;
    }
    .nav-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-color);
    }
    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--text-color);
      font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: var(--accent-color);
    }
    .content {
      max-width: 600px;
      margin: 100px auto;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: var(--accent-color);
    }
    p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #666;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: var(--accent-color);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #1570c9;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">Samotics</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>
  <div class="content">
    <h1>404</h1>
    <p>Page not found. The page you're looking for doesn't exist.</p>
    <a href="/" class="button">Go Home</a>
  </div>
</body>
</html>
