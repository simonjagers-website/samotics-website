  <style>
    /* ========================================
       SHARED TOKENS (sam- prefixed for header/footer)
       ======================================== */

    :root {
      --sam-space-cadet: #1F1F33;
      --sam-orange: #FF5429;
      --sam-orange-dark: #D7411B;
      --sam-blue: #005CBA;
      --sam-white: #FFFFFF;
      --sam-seashell: #F8F5F2;
      --sam-black: #111111;
      --sam-comet: #6B6B7F;
      --sam-border-light: #E8E4E0;
      --sam-header-bg: #1F1F33;
      --sam-font: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --sam-header-h: 80px;
      --sam-header-h-compact: 64px;
      --sam-transition: 150ms ease-out;
    }

    /* ========================================
       PAGE-SPECIFIC TOKENS
       ======================================== */

    :root {
      --space-cadet: #1F1F33;
      --white: #FFFFFF;
      --seashell: #F8F5F2;
      --orange: #FF5429;
      --comet: #6B6B7F;
      --border-grey: #E5E7EB;
      --blue-600: #005CBA;
      --dark-blue-300: #A0A0B8;

      --font-primary: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-data: 'JetBrains Mono', 'Consolas', monospace;

      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --space-24: 96px;
      --space-30: 120px;

      --radius-default: 4px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 3px rgba(31, 31, 51, 0.08);
      --motion-fast: 100ms;
      --motion-normal: 300ms;
      --max-width: 1120px;
      --max-width-wide: 1280px;
    }
