  <style>
    /* Header CSS */
    /* ============================================================
   SAMOTICS HEADER – CSS
   Paste into Bricks Code Element → CSS tab
   ============================================================ */

/* ── Tokens ── */
:root {
  --sam-space-cadet: #1F1F33;
  --sam-orange: #FF5429;
  --sam-orange-dark: #D7411B;
  --sam-blue: #005CBA;
  --sam-white: #FFFFFF;
  --sam-seashell: #F8F5F2;
  --sam-black: #111111;
  --sam-comet: #6B6B7F;
  --sam-border-light: #E8E4E0;
  --sam-header-bg: #1F1F33;
  --sam-font: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --sam-header-h: 80px;
  --sam-header-h-compact: 64px;
  --sam-transition: 150ms ease-out;
}

/* ── Skip Link ── */
.sam-skip-link {
  position: absolute;
  top: -100%;
  left: 16px;
  z-index: 10001;
  padding: 8px 16px;
  background: var(--sam-orange);
  color: var(--sam-white);
  font: 600 14px/1 var(--sam-font);
  text-decoration: none;
  border-radius: 0;
}
.sam-skip-link:focus {
  top: 8px;
}

/* ── Header Shell ── */
.sam-header {
      position: sticky; top: 0; z-index: 1000; width: 100%;
      height: var(--sam-header-h); background: var(--sam-header-bg);
      transition: height var(--sam-transition), box-shadow var(--sam-transition);
    }
    .sam-header.is-scrolled {
  height: var(--sam-header-h-compact);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
}

/* ── Inner Container ── */
.sam-header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  max-width: 1584px;
  margin: 0 auto;
  padding: 0 32px; gap: 24px; }

/* ── Logo ── */
.sam-header__logo {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  text-decoration: none;
}
.sam-logo {
  height: auto;
  transition: transform 200ms ease-out, filter 200ms ease-out;
}
/* Logo: white version on dark header */
.sam-logo--white {
  
}
.sam-logo--dark {
  display: none;
}
.sam-header.is-scrolled .sam-logo { transform: scale(0.92); }

/* ── Desktop Nav ── */
.sam-nav { display: flex; align-items: center; justify-content: center; gap: 28px; flex: 1; }

/* Nav Links — <a> tags so they're clickable AND hoverable */
.sam-nav__link {
  font: 500 15px/1 var(--sam-font);
  color: rgba(255, 255, 255, 0.85);
  text-decoration: none;
  padding: 8px 0;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  position: relative;
  transition: color var(--sam-transition);
  white-space: nowrap;
}
.sam-nav__link:hover,
.sam-nav__link:focus {
  color: rgba(255, 255, 255, 1);
  outline: none;
}
.sam-nav__link.active {
  color: var(--sam-orange);
}
.sam-nav__link::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0%;
  height: 2px;
  background: var(--sam-orange);
  transition: width var(--sam-transition);
}
.sam-nav__link:hover::after,
.sam-nav__link.active::after {
  width: 100%;
}

/* Dropdown Trigger — spans with dropdown class */
.sam-nav__dropdown-trigger {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.sam-nav__dropdown-trigger::after {
  content: '';
  width: 0;
  height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid rgba(255, 255, 255, 0.85);
  transition: transform var(--sam-transition);
}
.sam-nav__item.has-dropdown:hover .sam-nav__dropdown-trigger::after,
.sam-nav__item.has-dropdown.open .sam-nav__dropdown-trigger::after {
  transform: rotateZ(180deg);
  border-top-color: rgba(255, 255, 255, 1);
}

/* Dropdown Menu */
.sam-nav__dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--sam-header-bg);
  border-radius: 4px;
  padding: 8px 0;
  list-style: none;
  margin: 0;
  min-width: 200px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-8px);
  transition: opacity var(--sam-transition), visibility var(--sam-transition), transform var(--sam-transition);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
  z-index: 1001;
}
.sam-nav__item.has-dropdown:hover .sam-nav__dropdown,
.sam-nav__item.has-dropdown.open .sam-nav__dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.sam-nav__dropdown-item {
  padding: 0;
}
.sam-nav__dropdown-link {
  display: block;
  padding: 8px 16px;
  color: rgba(255, 255, 255, 0.75);
  text-decoration: none;
  font: 400 14px/1 var(--sam-font);
  white-space: nowrap;
  transition: color var(--sam-transition), background var(--sam-transition);
}
.sam-nav__dropdown-link:hover {
  color: var(--sam-white);
  background: rgba(255, 255, 255, 0.05);
}

/* CTA Button */
.sam-header__cta {
  flex-shrink: 0;
  padding: 8px 20px;
  background: var(--sam-orange);
  color: var(--sam-white);
  text-decoration: none;
  font: 600 14px/1 var(--sam-font);
  border-radius: 0;
  border: none;
  cursor: pointer;
  transition: background var(--sam-transition);
}
.sam-header__cta:hover,
.sam-header__cta:focus {
  background: var(--sam-orange-dark);
  outline: none;
}

/* Mobile Menu Hamburger */
.sam-header__mobile-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
}
.sam-header__mobile-toggle span {
  width: 20px;
  height: 2px;
  background: var(--sam-white);
  transition: background var(--sam-transition);
}

/* ── Responsive (Mobile) ── */
@media (max-width: 768px) {
  .sam-header__inner {
    padding: 0 16px;
    gap: 16px;
  }
  .sam-header__mobile-toggle {
    display: flex;
  }
  .sam-nav {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    flex-direction: column;
    gap: 0;
    background: var(--sam-header-bg);
    padding: 16px;
    list-style: none;
    margin: 0;
  }
  .sam-nav.open {
    display: flex;
  }
  .sam-nav__item.has-dropdown .sam-nav__dropdown {
    position: static;
    opacity: 0;
    visibility: hidden;
    transform: none;
    background: transparent;
    box-shadow: none;
    padding: 0;
    margin: 8px 0 0 0;
  }
  .sam-nav__item.has-dropdown.open .sam-nav__dropdown {
    opacity: 1;
    visibility: visible;
  }
  .sam-header__cta {
    display: none;
  }
}
  </style>
